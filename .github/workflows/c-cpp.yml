name: C/C++ CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-mac:
    name: Build mac target
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build mac executable
        run: make mac

      - name: Upload mac artifact
        uses: actions/upload-artifact@v4
        with:
          name: Tabernacle_mac
          path: Tabernacle_mac

  build-linux:
    name: Build linux target
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install raylib dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libraylib-dev libgl1-mesa-dev libx11-dev

      - name: Build unix executable
        run: make unx

      - name: Upload linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: Tabernacle_unx
          path: Tabernacle_unx
