name: C/C++ CI

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  build-mac:
    name: Build mac app
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build mac app bundle
        run: make mac_app

      - name: Package mac build
        run: |
          mkdir -p release
          cp -R Tabernacle.app release/Tabernacle.app
          cd release
          zip -r Templegame-macos.zip Tabernacle.app

      - name: Upload mac artifact
        uses: actions/upload-artifact@v4
        with:
          name: Templegame-macos
          path: release/Templegame-macos.zip

  build-linux:
    name: Build linux target
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            git \
            cmake \
            libasound2-dev \
            mesa-common-dev \
            libx11-dev \
            libxrandr-dev \
            libxi-dev \
            xorg-dev \
            libgl1-mesa-dev \
            libglu1-mesa-dev

      - name: Build linux executable
        run: make unx

      - name: Package linux build
        run: |
          mkdir -p release/Templegame-linux
          cp Tabernacle_linux release/Templegame-linux/Tabernacle
          chmod +x release/Templegame-linux/Tabernacle
          cp -R Game release/Templegame-linux/Game
          tar -czf release/Templegame-linux.tar.gz -C release Templegame-linux

      - name: Upload linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: Templegame-linux
          path: release/Templegame-linux.tar.gz

  build-windows:
    name: Build windows target
    runs-on: windows-latest

    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4

      - name: Build windows executable
        run: mingw32-make win

      - name: Package windows build
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release/Templegame-windows | Out-Null
          Copy-Item Tabernacle.exe release/Templegame-windows/Tabernacle.exe
          Copy-Item Game release/Templegame-windows/Game -Recurse
          Compress-Archive -Path release/Templegame-windows -DestinationPath release/Templegame-windows.zip -Force

      - name: Upload windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: Templegame-windows
          path: release/Templegame-windows.zip

  release:
    name: Create GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-mac, build-linux, build-windows]
    runs-on: ubuntu-latest

    steps:
      - name: Download mac artifact
        uses: actions/download-artifact@v4
        with:
          name: Templegame-macos
          path: release-assets

      - name: Download linux artifact
        uses: actions/download-artifact@v4
        with:
          name: Templegame-linux
          path: release-assets

      - name: Download windows artifact
        uses: actions/download-artifact@v4
        with:
          name: Templegame-windows
          path: release-assets

      - name: Create release and upload packages
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/Templegame-macos.zip
            release-assets/Templegame-linux.tar.gz
            release-assets/Templegame-windows.zip
          generate_release_notes: true
          draft: true