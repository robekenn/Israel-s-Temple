name: C/C++ CI

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  build-mac:
    name: Build mac target
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build mac executable
        run: make mac

      - name: Upload mac artifact
        uses: actions/upload-artifact@v4
        with:
          name: Tabernacle-mac
          path: Tabernacle_mac

  build-linux:
    name: Build linux target
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            git \
            cmake \
            libasound2-dev \
            mesa-common-dev \
            libx11-dev \
            libxrandr-dev \
            libxi-dev \
            xorg-dev \
            libgl1-mesa-dev \
            libglu1-mesa-dev

      - name: Install raylib from source
        run: |
          git clone --depth 1 https://github.com/raysan5/raylib.git
          cd raylib/src
          make PLATFORM=PLATFORM_DESKTOP
          sudo make install
          sudo ldconfig

      - name: Build unix executable
        run: make unx

      - name: Upload linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: Tabernacle-linux
          path: Tabernacle_linux

  build-windows:
    name: Build windows target
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build raylib
        run: |
          git clone --depth 1 https://github.com/raysan5/raylib.git
          cd raylib\src
          mingw32-make PLATFORM=PLATFORM_DESKTOP
        shell: cmd

      - name: Build windows executable
        run: |
          gcc -IGame/src -IGame/Character_System ^
            -Iraylib/src -Iraylib/src/external/glfw/include ^
            -o Tabernacle.exe ^
            Game\Tabernacle.c Game\Character_System\CharacterSystem.c ^
            raylib\src\libraylib.a ^
            -lopengl32 -lgdi32 -lwinmm
        shell: cmd

      - name: Upload windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: Tabernacle-windows
          path: Tabernacle.exe   

  release:
    name: Create GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-mac, build-linux, build-windows]
    runs-on: ubuntu-latest

    steps:
      - name: Download mac artifact
        uses: actions/download-artifact@v4
        with:
          name: Tabernacle-mac
          path: release-files

      - name: Download linux artifact
        uses: actions/download-artifact@v4
        with:
          name: Tabernacle-linux
          path: release-files

      - name: Download windows artifact
        uses: actions/download-artifact@v4
        with:
          name: Tabernacle-windows
          path: release-files

      - name: Create release and upload binaries
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-files/Tabernacle_mac
            release-files/Tabernacle_linux
            release-files/Tabernacle.exe
          generate_release_notes: true